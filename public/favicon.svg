<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo oscuro con bordes redondeados -->
  <rect width="32" height="32" rx="8" fill="#0f172a" />
  <rect x="1" y="1" width="30" height="30" rx="7" stroke="url(#border-gradient)" stroke-width="1.5" />
  
  <!-- Tipografía ML moderna y elegante con gradiente -->
  <text x="16" y="21" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="12" 
        font-weight="900" 
        fill="url(#text-gradient)" 
        text-anchor="middle" 
        letter-spacing="0.5">ML</text>
        
  <!-- Punto brillante de glow en la parte superior derecha de ML -->
  <circle cx="23" cy="11" r="2" fill="#3b82f6" filter="url(#dot-glow)" />

  <defs>
    <linearGradient id="border-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6" />
      <stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>
    
    <linearGradient id="text-gradient" x1="0" y1="8" x2="0" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" />
      <stop offset="1" stop-color="#94a3b8" />
    </linearGradient>
    
    <filter id="dot-glow" x="19" y="7" width="8" height="8" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>